<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Agro Forte Sustentável</h1>
    <p>Educação e Sustentabilidade</p>

    <!-- 🔧 ACESSIBILIDADE -->
    <div class="accessibility">
        <button onclick="toggleDark()">🌙 Modo</button>
        <button onclick="aumentarBrilho()">🔆 + Brilho</button>
        <button onclick="diminuirBrilho()">🌘 - Brilho</button>
    </div>
</header>

<nav>
    <a href="#quiz">Quiz</a>
</nav>

<section id="quiz">
    <h2>Quiz Sustentável 🌱</h2>

    <div id="quiz-container">
        <p id="question"></p>

        <div id="options"></div>

        <p id="result"></p>

        <button onclick="nextQuestion()">Próxima</button>
    </div>

    <h3>Pontos: <span id="score">0</span></h3>
</section>

<footer>
    <p>Projeto Escolar © 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
